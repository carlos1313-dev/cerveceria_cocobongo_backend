# =============================================
# PERFIL: PRODUCCIÓN (prod)
# Para Railway + Neon
# =============================================

# ─── BASE DE DATOS (Neon con pooler) ───────
# ⚠️ CRÍTICO: Usar jdbc:postgresql:// NO postgresql://
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cocobongo_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cesr1311}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - Optimizado para Neon pooler
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:300000}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=600000

# ❌ ELIMINA O COMENTA ESTA LÍNEA (Es la que causa el "pool is sealed"):
# spring.datasource.hikari.connection-test-query=SELECT 1

spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=0

# ─── JPA / HIBERNATE ───────────────────────
# ❌ NO usar database-platform, Hibernate lo detecta automáticamente
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Forzar UTC en toda la aplicación
spring.jackson.time-zone=UTC

# ─── THYMELEAF ─────────────────────────────
spring.thymeleaf.cache=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ─── DEVTOOLS ──────────────────────────────
spring.devtools.restart.enabled=false

# ─── APP CUSTOM PROPERTIES ──────────────────
app.jwt.secret=${APP_JWT_SECRET:o7nKtvcO+DrAtnrpGy0xiYHmAKlGgs3D+dP2Izuamwo=}
app.jwt.expiration-hours=${APP_JWT_EXPIRATION_HOURS:24}

# ─── LOGGING ─────────────────────────────────
logging.level.root=WARN
logging.level.com.cocobongo.cerveceria=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ─── SERVIDOR (Railway requiere PORT y address) ────────
server.port=${PORT:8082}
server.address=0.0.0.0
server.servlet.context-path=/
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# ─── MANAGEMENT (Actuator) ────────
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.info.env.enabled=true

# ─── INFO (para health check) ────────
info.app.name=Cerveceria Cocobongo
info.app.version=1.0.0
info.app.environment=production
info.app.database=PostgreSQL (Neon)
