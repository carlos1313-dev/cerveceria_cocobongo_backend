# =============================================
# Configuración para Cervecería Cocobongo
# Spring Boot 3.4.1 | PostgreSQL (Neon) | JPA
# Desplegado en Railway
# =============================================

# ─── PERFIL ACTIVO ───────────────────────────
# Railway debe setear SPRING_PROFILES_ACTIVE=prod
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

---
# =============================================
# PERFIL: DESARROLLO (dev)
# =============================================
spring:
  config:
    activate:
      on-profile: dev

  # ─── BASE DE DATOS POSTGRESQL ──────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/cocobongo_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:cesr1311}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 600000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 60000  # Detecta conexiones olvidadas

  # ─── JPA / HIBERNATE ───────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update          # Solo en desarrollo
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 100

  # ─── DEVTOOLS ──────────────────────────────
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
    livereload:
      enabled: true

  # ─── THYMELEAF ─────────────────────────────
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

# ─── APP CUSTOM PROPERTIES ──────────────────
app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_key_cambiar_en_produccion_minimo_32_caracteres_123456}
    expiration-hours: 24  

# ─── LOGGING ─────────────────────────────────
logging:
  level:
    root: INFO
    com.cocobongo.cerveceria: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# ─── SERVIDOR ────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  error:
    include-stacktrace: never  # 🔴 CRÍTICO: No exponer stacktrace ni en dev
    include-message: always
    include-binding-errors: always

---
# =============================================
# PERFIL: PRODUCCIÓN (prod)
# Para Railway + Neon
# =============================================
spring:
  config:
    activate:
      on-profile: prod

  # ─── BASE DE DATOS (Neon con pooler) ───────
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Optimizado para Neon pooler
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 600000
      connection-test-query: SELECT 1
      validation-timeout: 5000
      leak-detection-threshold: 0  # Deshabilitado en prod por rendimiento

  # ─── JPA / HIBERNATE ───────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate            # 🔴 NUNCA usar update en producción
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
          fetch_size: 100
        order_inserts: true
        order_updates: true

  # ─── THYMELEAF ─────────────────────────────
  thymeleaf:
    cache: true
    mode: HTML
    encoding: UTF-8

  # ─── DEVTOOLS ──────────────────────────────
  devtools:
    restart:
      enabled: false

# ─── APP CUSTOM PROPERTIES ──────────────────
app:
  jwt:
    secret: ${JWT_SECRET:temporal_railway_secret_2026_cambiar_antes_produccion}  # Requerido en producción
    expiration-hours: ${JWT_EXPIRATION_HOURS:24}

# ─── LOGGING ─────────────────────────────────
logging:
  level:
    root: WARN
    com.cocobongo.cerveceria: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# ─── SERVIDOR (Railway requiere PORT) ────────
server:
  port: ${PORT:8080}
  address: 0.0.0.0      # ← Necesario para Railway  #  CRÍTICO: Railway asigna puerto dinámico
  servlet:
    context-path: /
  error:
    include-stacktrace: never
    include-message: never
    include-binding-errors: never
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# ─── MANAGEMENT (Actuator - Opcional) ────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
  info:
    env:
      enabled: true

# ─── INFO (para health check) ────────────────
info:
  app:
    name: Cerveceria Cocobongo
    version: 1.0.0
    environment: production
    database: PostgreSQL (Neon)