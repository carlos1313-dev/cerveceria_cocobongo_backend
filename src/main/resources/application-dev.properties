# ─── BASE DE DATOS POSTGRESQL ──────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/cocobongo_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:cesr1311}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000

# ─── JPA / HIBERNATE ───────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=100

# ─── DEVTOOLS ──────────────────────────────
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.livereload.enabled=true

# ─── THYMELEAF ─────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── APP CUSTOM PROPERTIES ──────────────────
app.jwt.secret=${JWT_SECRET:dev_secret_key_cambiar_en_produccion_minimo_32_caracteres_123456}
app.jwt.expiration-hours=24

# ─── LOGGING ─────────────────────────────────
logging.level.root=INFO
logging.level.com.cocobongo.cerveceria=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ─── SERVIDOR ────────────────────────────────
server.port=${PORT:8082}
server.servlet.context-path=/
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=always